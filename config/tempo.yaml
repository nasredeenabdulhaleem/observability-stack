# ═══════════════════════════════════════════════════════════════
# Tempo Configuration — Distributed Traces
# ═══════════════════════════════════════════════════════════════

server:
  http_listen_port: 3200
  log_level: warn

# Accepts traces from the OTel Collector via OTLP
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  # Flush blocks to storage every 5 minutes
  max_block_duration: 5m

compactor:
  compaction:
    # How long to keep traces. Increase for longer history.
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    block:
      bloom_filter_false_positive: .05
