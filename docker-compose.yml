# ═══════════════════════════════════════════════════════════════
# Observability Stack
# ───────────────────────────────────────────────────────────────
# Services:
#   1. OpenTelemetry Collector  — telemetry routing hub
#   2. Prometheus               — metrics storage
#   3. Loki                     — log aggregation
#   4. Tempo                    — distributed traces
#   5. Grafana                  — unified dashboards + alerting
#   6. GlitchTip                — error tracking (Sentry-compatible)
#   7. Uptime Kuma              — uptime monitoring + status page
#
# CONNECTIVITY — two ways to send telemetry from your apps:
#
#   A) Internal (same server, Docker network — recommended):
#      Join the "observability" network from your app's compose.
#      See sdk/compose-snippet.yml for the snippet to add.
#      Endpoint: http://otel-collector:4317
#
#   B) External (any server, host IP):
#      Ports 4317 + 4318 are exposed on the host.
#      Endpoint: http://YOUR_SERVER_IP:4317
#
# Coolify deployment:
#   New Resource → Application → Docker Compose → GitHub → set env vars → assign domains → Deploy
# ═══════════════════════════════════════════════════════════════

networks:
  # ── Shared observability network ─────────────────────────────
  # Created by this stack. Other app stacks on the same server
  # join this network to reach otel-collector by service name.
  # See sdk/compose-snippet.yml for how to join from another stack.
  observability:
    name: observability
    driver: bridge

services:

  # ─────────────────────────────────────────────────────────────
  # 1. OpenTelemetry Collector
  # ─────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    restart: unless-stopped
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"   # External: apps on other servers
      - "${OTEL_HTTP_PORT:-4318}:4318"   # External: apps on other servers (HTTP)
    networks:
      - default          # Internal stack communication
      - observability    # Shared network for same-server apps
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # 2. Prometheus — Metrics storage
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # 3. Loki — Log aggregation
  # ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    restart: unless-stopped
    volumes:
      - ./config/loki.yaml:/etc/loki/config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # 4. Tempo — Distributed traces
  # ─────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.1
    restart: unless-stopped
    volumes:
      - ./config/tempo.yaml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # 5. Grafana — Dashboards, alerting, on-call
  # ─────────────────────────────────────────────────────────────
  # Coolify: assign domain → grafana.yourdomain.com:3000
  grafana:
    image: grafana/grafana-oss:10.4.2
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      # Enable unified alerting
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # 6. GlitchTip — Error tracking (Sentry-compatible)
  # ─────────────────────────────────────────────────────────────
  # Coolify: assign domain → errors.yourdomain.com:8000
  glitchtip-web:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://gt:${GLITCHTIP_DB_PASSWORD:?}@glitchtip-db/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?}
      REDIS_URL: redis://glitchtip-redis:6379
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:?}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@example.com}
      EMAIL_BACKEND: ${GLITCHTIP_EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${GLITCHTIP_EMAIL_HOST:-}
      EMAIL_PORT: ${GLITCHTIP_EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${GLITCHTIP_EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${GLITCHTIP_EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${GLITCHTIP_EMAIL_TLS:-True}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://gt:${GLITCHTIP_DB_PASSWORD}@glitchtip-db/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      REDIS_URL: redis://glitchtip-redis:6379
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@example.com}
      EMAIL_BACKEND: ${GLITCHTIP_EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${GLITCHTIP_EMAIL_HOST:-}
      EMAIL_HOST_PASSWORD: ${GLITCHTIP_EMAIL_HOST_PASSWORD:-}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy

  glitchtip-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: gt
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gt -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5

  glitchtip-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - glitchtip-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # 7. Uptime Kuma — Uptime monitoring + public status page
  # ─────────────────────────────────────────────────────────────
  # Coolify: assign domain → status.yourdomain.com:3001
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
  glitchtip-db-data:
  glitchtip-redis-data:
  uptime-kuma-data:
